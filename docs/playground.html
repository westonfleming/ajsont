<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — ajsont</title>
  <meta name="description" content="Interactive ajsont playground. Paste a JSON payload and a transform template, then run the transform and see the result instantly." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236d5efc'/%3E%3Ctext x='16' y='22' font-size='16' font-family='monospace' font-weight='bold' fill='white' text-anchor='middle'%3E%7B%7D%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="pg-body">
  <header class="nav">
    <div class="container">
      <a class="brand" href="index.html"><span class="logo">{}</span><span>ajsont</span></a>
      <nav class="nav-links">
        <a class="navlink" href="index.html">Home</a>
        <a class="navlink" href="docs.html">Docs</a>
        <a class="navlink" href="playground.html">Playground</a>
        <a class="navlink" href="https://github.com/westonfleming/ajsont" target="_blank" rel="noopener">GitHub</a>
        <button class="icon-btn theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Toolbar with the Run button -->
  <div class="pg-toolbar">
    <span class="title">Playground</span>
    <span class="hint">Edit the payload and template — validation runs automatically.</span>
    <span class="spacer"></span>
    <div class="pg-samples">
      <label class="sub" for="pg-sample" style="color:var(--text-faint);font-size:.82rem">Example:</label>
      <select id="pg-sample">
        <option value="basic">User mapping</option>
        <option value="conditional">Conditional &amp; coalesce</option>
        <option value="strings">String transforms</option>
        <option value="empty">Blank</option>
      </select>
    </div>
    <button class="btn btn-primary" id="pg-run" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      Run transform
    </button>
  </div>

  <!-- Three panes -->
  <main class="pg-main">
    <!-- Left column: two stacked panes -->
    <div class="pg-left">
      <section class="pg-pane">
        <div class="pg-pane-head">
          <span class="label">Input payload</span>
          <span class="sub">source JSON</span>
          <span class="pg-status idle" id="pg-json-status"><span class="dot"></span><span class="txt">empty</span></span>
        </div>
        <textarea class="pg-editor" id="pg-json" spellcheck="false" placeholder='{ "hello": "world" }'></textarea>
      </section>
      <section class="pg-pane">
        <div class="pg-pane-head">
          <span class="label">Transform template</span>
          <span class="sub">ajsont spec</span>
          <span class="pg-status idle" id="pg-spec-status"><span class="dot"></span><span class="txt">empty</span></span>
        </div>
        <textarea class="pg-editor" id="pg-spec" spellcheck="false" placeholder='{ "greeting": { "$path": "$.hello" } }'></textarea>
        <div class="pg-errs" id="pg-spec-errs"></div>
      </section>
    </div>

    <!-- Right column: full-height output -->
    <section class="pg-pane pg-right-pane">
      <div class="pg-pane-head">
        <span class="label">Output</span>
        <span class="sub">transform result</span>
        <button class="copy-code" id="pg-copy-out" style="margin-left:auto" title="Copy output">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span class="copy-label">Copy</span>
        </button>
      </div>
      <pre class="pg-output" id="pg-output"><span class="placeholder">Press “Run transform” to see the result here.</span></pre>
    </section>
  </main>

  <script type="module" src="assets/playground.js"></script>
  <script src="assets/site.js"></script>
</body>
</html>
